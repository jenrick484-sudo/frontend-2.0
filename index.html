<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Daiho Auto Parts Supply - Admin Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section class="left">
      <div class="brand">
        <div class="logo">⚙️</div>
        <div class="brand-text">
          <h1>Daiho</h1>
          <div class="sub">Auto Parts Supply</div>
        </div>
      </div>

      <h2>Admin Login</h2>
      <p class="hint">Please enter your details</p>

      <form id="loginForm">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" required placeholder="admin@daiho.com" />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required placeholder="••••••••" />

        <button type="submit" class="btn primary">Log in</button>

        <div id="message" class="message" aria-live="polite"></div>
      </form>
    </section>

    <section class="right">
      <div class="illustration">
        <img alt="Admin dashboard illustration" src="" />
        <div class="illustration-text">
          <h3>Admin Dashboard</h3>
          <p>Monitor inventory, orders, and reports.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
